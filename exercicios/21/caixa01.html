<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            height: 300px;
            width: 300px;
            background-color: lightgreen;
            border-width: 10px;
            /*Largura(espessura) da borda*/
            border-style: groove;
            border-color: darkslategray;

            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;

            /*margin: auto;*/

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 20px;
            margin-left: 10px;

            outline-width: 10px;
            outline-style: dotted;
            outline-color: blue;

        }

        h1:hover {
            background-color: rgb(22, 152, 208);
        }

        p {
            margin-bottom: 30px;
        }

        a {
            border-width: 20px;
            border-style: groove;
            border-color: red;
            background-color: red;
            color: white;
            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 30px;
        }

        video {
            display: block;
            /*margin: auto;*/
            width: 300px;
        }

        .video {
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            font-size: smaller;
            border: none;
            margin: none;
            padding: none;
        }
    </style>
</head>

<body>
    <h1>Exemplo de Caixa Box-Level</h1>
    <p>Parágrafos são exemplos de box-level, mas os <a href="">links são exemplos de caixas inline-level.</a> Vamos ver
        como tudo isso funciona na prática</p>
    <video controls autoplay src="videos/novo_processo_de_rebaixa_08.07.2025.mp4"></video>
    <h1 class="video">Clique no vídeo acima para aprender o novo processo de rebaixa</h1>
</body>

</html>
